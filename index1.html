<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售管理 - 完整功能版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-4">
    <!-- 登录遮罩层 -->
    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">系统登录</h2>
            <input type="email" id="authEmail" placeholder="邮箱" class="w-full border p-3 rounded-lg mb-4 outline-none">
            <input type="password" id="authPassword" placeholder="密码" class="w-full border p-3 rounded-lg mb-6 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mb-3">登录</button>
            <p id="authMsg" class="text-red-500 text-xs text-center"></p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <!-- 顶部统计卡片 - 已添加“今日总计” -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-5 rounded-lg shadow border-l-4 border-blue-600 hover:shadow-md transition">
                <p class="text-gray-500 text-sm font-medium">今日订单总计 (Total Sum)</p>
                <h2 class="text-2xl font-bold text-blue-600">￥<span id="todayTotalSum">0.00</span></h2>
            </div>
            <div class="bg-white p-5 rounded-lg shadow border-l-4 border-green-500 hover:shadow-md transition">
                <p class="text-gray-500 text-sm font-medium">今日毛利 (Total - Cost)</p>
                <h2 class="text-2xl font-bold text-gray-800">￥<span id="todayProfit">0.00</span></h2>
            </div>
            <div class="bg-white p-5 rounded-lg shadow border-l-4 border-blue-500 hover:shadow-md transition">
                <p class="text-gray-500 text-sm font-medium">本月毛利 (Total - Cost)</p>
                <h2 class="text-2xl font-bold text-gray-800">￥<span id="monthProfit">0.00</span></h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 录入表单 -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                    <span class="mr-2">📝</span> 销售录入
                </h3>
                <form id="salesForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">选择产品</label>
                        <select id="productSelect" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:ring-2 focus:ring-blue-500" required>
                            <option value="">正在连接数据库...</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">数量</label>
                            <input type="number" id="quantity" min="1" value="1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" onfocus="this.select()">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">总成本 (Cost)</label>
                            <input type="number" id="cost" step="0.01" class="mt-1 block w-full border-orange-300 rounded-md shadow-sm p-2 border bg-orange-50 focus:bg-white" onfocus="this.select()">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">订单总金额 (Total)</label>
                        <input type="number" id="total" step="0.01" class="mt-1 block w-full border-blue-300 rounded-md shadow-sm p-2 border bg-blue-50 font-bold text-lg focus:bg-white" onfocus="this.select()">
                    </div>

                    <div id="profitPreview" class="p-3 bg-gray-100 rounded text-sm text-center font-bold text-gray-500">
                        预期毛利: ￥0.00
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg active:scale-95">
                        确认提交订单
                    </button>
                </form>
            </div>

            <!-- 数据表格[cite: 1] -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <span class="font-bold text-gray-700">近期销售流水记录</span>
                    <button onclick="loadSales()" class="text-xs text-blue-600 hover:underline">刷新数据</button>
                </div>
                <div class="overflow-x-auto overflow-y-auto max-h-[600px]">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-100 sticky top-0 z-10 text-gray-600">
                            <tr>
                                <th class="px-4 py-3 text-left font-semibold">日期</th>
                                <th class="px-4 py-3 text-left font-semibold">产品</th>
                                <th class="px-4 py-3 text-left font-semibold text-center">数量</th>
                                <th class="px-4 py-3 text-left font-semibold text-center">总额</th>
                                <th class="px-4 py-3 text-left font-semibold text-center">毛利</th>
                                <th class="px-4 py-3 text-center font-semibold text-red-500">操作</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody" class="divide-y divide-gray-100 bg-white">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dannrjpyjxuptpkitznd.supabase.co";[cite: 1]
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhbm5yanB5anh1cHRwa2l0em5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTA3MTMsImV4cCI6MjA5MzE2NjcxM30.i4bWHW-qM2oiXHSNQEv1v89pb7wtLDJZVQ9ib9vGM7w";[cite: 1]
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);[cite: 1]

        const formElements = {
            product: document.getElementById('productSelect'),
            qty: document.getElementById('quantity'),
            cost: document.getElementById('cost'),
            total: document.getElementById('total'),
            preview: document.getElementById('profitPreview')
        };

        async function initApp() {
            await loadProducts();
            await loadSales();
        }

        async function loadProducts() {
            const { data, error } = await supabaseClient.from('products').select('*');[cite: 1]
            if (error) return console.error(error);
            formElements.product.innerHTML = '<option value="">-- 选择产品 --</option>' + 
                data.map(p => `<option value="${p.id}" data-price="${p.price}" data-cost="${p.cost}">${p.name}</option>`).join('');
        }

        function updateCalculations() {
            const currentCost = parseFloat(formElements.cost.value) || 0;[cite: 1]
            const currentTotal = parseFloat(formElements.total.value) || 0;[cite: 1]
            const profit = currentTotal - currentCost;[cite: 1]

            formElements.preview.innerText = `预期毛利: ￥${profit.toFixed(2)}`;[cite: 1]
            formElements.preview.className = `p-3 rounded text-sm text-center font-bold ${profit >=0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;[cite: 1]
        }

        formElements.product.onchange = () => {
            const opt = formElements.product.options[formElements.product.selectedIndex];
            if(opt.value) {
                formElements.cost.value = opt.dataset.cost;[cite: 1]
                formElements.total.value = (opt.dataset.price * formElements.qty.value).toFixed(2);[cite: 1]
                updateCalculations();
            }
        };

        [formElements.qty, formElements.cost, formElements.total].forEach(el => {
            el.oninput = updateCalculations;
        });

        async function loadSales() {
            const { data, error } = await supabaseClient.from('sales').select('*, products(name)').order('created_at', { ascending: false });[cite: 1]
            if (error) return;

            let todayTotal = 0; // 新增今日总额累计[cite: 1]
            let todayP = 0, monthP = 0;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            const rows = data.map(sale => {
                const orderProfit = sale.total - sale.cost;[cite: 1]
                const saleDate = new Date(sale.created_at);
                
                if (sale.created_at.startsWith(todayStr)) {
                    todayTotal += parseFloat(sale.total); // 累计今日成交总额[cite: 1]
                    todayP += orderProfit;
                }
                if (saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear()) monthP += orderProfit;

                return `
                    <tr class="hover:bg-gray-50 border-b last:border-0">
                        <td class="px-4 py-3 text-xs text-gray-400 font-mono">${saleDate.toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</td>
                        <td class="px-4 py-3 font-medium text-gray-700">${sale.products?.name || '已失效'}</td>
                        <td class="px-4 py-3 text-center">${sale.quantity}</td>
                        <td class="px-4 py-3 text-center font-bold text-blue-600">￥${parseFloat(sale.total).toFixed(2)}</td>
                        <td class="px-4 py-3 text-center font-bold ${orderProfit >=0 ? 'text-green-600' : 'text-red-600'}">￥${orderProfit.toFixed(2)}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="deleteSale(${sale.id})" class="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50 transition">
                                <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </td>
                    </tr>`;
            });

            document.getElementById('salesTableBody').innerHTML = rows.join('');
            document.getElementById('todayTotalSum').innerText = todayTotal.toLocaleString(undefined, {minimumFractionDigits: 2}); // 更新 UI[cite: 1]
            document.getElementById('todayProfit').innerText = todayP.toLocaleString(undefined, {minimumFractionDigits: 2});[cite: 1]
            document.getElementById('monthProfit').innerText = monthP.toLocaleString(undefined, {minimumFractionDigits: 2});[cite: 1]
        }

        async function deleteSale(saleId) {
            if (!confirm('确定要永久删除这条销售记录吗？')) return;
            const { error } = await supabaseClient.from('sales').delete().eq('id', saleId);[cite: 1]
            if (error) alert('删除失败: ' + error.message); else await loadSales();
        }

        document.getElementById('salesForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;

            const { error } = await supabaseClient.from('sales').insert([{
                product_id: formElements.product.value,
                quantity: parseInt(formElements.qty.value),
                cost: parseFloat(formElements.cost.value),[cite: 1]
                total: parseFloat(formElements.total.value)[cite: 1]
            }]);

            if (error) alert(error.message);
            else {
                document.getElementById('salesForm').reset();
                formElements.preview.innerText = "预期毛利: ￥0.00";
                formElements.preview.className = "p-3 rounded text-sm text-center font-bold text-gray-500";
                await loadSales();
            }
            submitBtn.disabled = false;
        };

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();[cite: 1]
            if (user) {
                document.getElementById('authOverlay').classList.add('hidden');
                initApp();
            }
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = '验证中...';
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });[cite: 1]
            if (error) { document.getElementById('authMsg').innerText = "失败: " + error.message; btn.disabled = false; btn.innerText = '登录'; }
            else { location.reload(); }
        }

        checkUser();
    </script>
</body>
</html>
