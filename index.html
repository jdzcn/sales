<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售管理 - 导航版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .active-tab { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        input[type="date"] { appearance: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20 md:pb-4">

    <!-- 登录模块 (保持不变) -->
    <div id="loginModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80">
            <h2 class="text-xl font-bold mb-6 text-center">身份验证</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="账号" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="密码" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">登录</button>
            </div>
            <p id="loginError" class="text-red-500 text-xs mt-4 text-center"></p>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainContent" class="max-w-4xl mx-auto hidden">
        
        <!-- 顶部固定统计 & 导航 -->
        <div class="sticky top-0 z-40 bg-white shadow-sm border-b">
            <div class="grid grid-cols-3 gap-1 p-2 md:p-4 text-center border-b bg-gray-50/50">
                <div><p class="text-[10px] text-gray-500">今日</p><p class="font-bold text-blue-600 text-sm">￥<span id="todayTotalSum">0</span></p></div>
                <div><p class="text-[10px] text-gray-500">今日利</p><p class="font-bold text-green-600 text-sm">￥<span id="todayProfit">0</span></p></div>
                <div><p class="text-[10px] text-gray-500">本月利</p><p class="font-bold text-indigo-600 text-sm">￥<span id="monthProfit">0</span></p></div>
            </div>
            <!-- 导航标签 -->
            <nav class="flex justify-around bg-white">
                <button onclick="switchTab('entry')" id="tab-entry" class="flex-1 py-3 text-sm active-tab">销售录入</button>
                <button onclick="switchTab('list')" id="tab-list" class="flex-1 py-3 text-sm">流水明细</button>
                <button onclick="switchTab('report')" id="tab-report" class="flex-1 py-3 text-sm">报表中心</button>
            </nav>
        </div>

        <div class="p-4">
            <!-- 1. 录入视图 -->
            <section id="view-entry" class="view-section active">
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <form id="salesForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold">选择产品</label>
                            <select id="productSelect" class="mt-1 block w-full border-gray-300 rounded-md p-3 bg-gray-50 border text-lg" required></select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold">数量</label>
                                <input type="number" id="quantity" min="1" value="1" class="mt-1 block w-full p-3 border rounded-md text-center text-xl font-bold" onfocus="this.select()">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-orange-600">总成本</label>
                                <input type="number" id="cost" step="0.01" class="mt-1 block w-full p-3 border rounded-md bg-orange-50 text-center font-bold">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-blue-600">订单总金额</label>
                            <input type="number" id="total" step="0.01" class="mt-1 block w-full p-4 border rounded-md bg-blue-50 text-center text-2xl font-bold">
                        </div>
                        <div id="profitPreview" class="p-4 rounded-lg text-center font-bold text-lg bg-gray-100">预期毛利: ￥0.00</div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95">确认提交</button>
                    </form>
                </div>
            </section>

            <!-- 2. 流水视图 -->
            <section id="view-list" class="view-section">
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="min-w-full text-sm">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-2 py-3 text-left">产品/时间</th>
                                <th class="px-2 py-3 text-center">数</th>
                                <th class="px-2 py-3 text-right">金额/毛利</th>
                                <th class="px-2 py-3 text-center">删</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody" class="divide-y"></tbody>
                    </table>
                </div>
            </section>

            <!-- 3. 报表视图 -->
            <section id="view-report" class="view-section">
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <input type="date" id="startDate" class="border p-2 rounded text-sm w-full">
                            <input type="date" id="endDate" class="border p-2 rounded text-sm w-full">
                        </div>
                        <button onclick="generateReport()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">查询时间段汇总</button>
                    </div>
                    
                    <div id="reportResult" class="hidden space-y-4">
                        <div class="bg-white p-4 rounded-xl border shadow-sm">
                            <h4 class="font-bold border-b pb-2 mb-2 flex justify-between"><span>日期汇总</span><span id="dateReportTotal" class="text-green-600"></span></h4>
                            <div id="dateReportBody" class="space-y-2 text-sm"></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border shadow-sm">
                            <h4 class="font-bold border-b pb-2 mb-2">产品毛利排行</h4>
                            <div id="productReportBody" class="space-y-2 text-sm"></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 底部退出按钮 (仅手机端可见) -->
    <button onclick="handleLogout()" class="fixed bottom-4 right-4 bg-gray-800 text-white p-3 rounded-full shadow-xl opacity-50 hover:opacity-100 z-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <script>
        // Supabase 配置
        const SUPABASE_URL = "https://dannrjpyjxuptpkitznd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhbm5yanB5anh1cHRwa2l0em5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTA3MTMsImV4cCI6MjA5MzE2NjcxM30.i4bWHW-qM2oiXHSNQEv1v89pb7wtLDJZVQ9ib9vGM7w";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const formElements = {
            product: document.getElementById('productSelect'),
            qty: document.getElementById('quantity'),
            cost: document.getElementById('cost'),
            total: document.getElementById('total'),
            preview: document.getElementById('profitPreview')
        };

        // --- 视图切换 ---
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            
            if (tabId === 'list') loadSales();
        }

        // --- 权限逻辑 ---
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                init();
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("登录失败：" + error.message); else checkUser();
        }

        async function handleLogout() { await supabaseClient.auth.signOut(); checkUser(); }

        // --- 业务逻辑 ---
        async function init() {
            const { data } = await supabaseClient.from('products').select('*');
            formElements.product.innerHTML = '<option value="">选择产品...</option>' + 
                data.map(p => `<option value="${p.id}" data-price="${p.price}" data-cost="${p.cost}">${p.name}</option>`).join('');
            loadSales();
        }

        function updateCalculations() {
            const p = (parseFloat(formElements.total.value) || 0) - (parseFloat(formElements.cost.value) || 0);
            formElements.preview.innerText = `预期毛利: ￥${p.toFixed(2)}`;
            formElements.preview.className = `p-4 rounded-lg text-center font-bold text-lg ${p >=0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
        }

        formElements.qty.oninput = () => {
            const opt = formElements.product.options[formElements.product.selectedIndex];
            if (opt && opt.value) {
                const q = parseInt(formElements.qty.value) || 0;
                formElements.cost.value = (parseFloat(opt.dataset.cost) * q).toFixed(2);
                formElements.total.value = (parseFloat(opt.dataset.price) * q).toFixed(2);
                updateCalculations();
            }
        };
        formElements.product.onchange = () => { if(formElements.product.value) { formElements.qty.value = 1; formElements.qty.oninput(); } };
        [formElements.cost, formElements.total].forEach(el => el.oninput = updateCalculations);

        async function loadSales() {
            const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
            const todayStr = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
            const { data, error } = await supabaseClient.from('sales').select('*, products(name)').gte('created_at', firstDay).order('created_at', { ascending: false });
            if (error) return;

            let todaySum = 0, todayP = 0, monthP = 0;
            const rows = data.map(sale => {
                const profit = sale.total - sale.cost;
                const saleDate = new Date(sale.created_at);
                const saleDay = saleDate.toLocaleDateString('zh-CN').replace(/\//g, '-');
                if (saleDay === todayStr) { todaySum += sale.total; todayP += profit; }
                monthP += profit;

                return `<tr class="border-b">
                    <td class="p-3">
                        <div class="font-bold text-gray-700">${sale.products?.name}</div>
                        <div class="text-[10px] text-gray-400 font-mono">${saleDate.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
                    </td>
                    <td class="text-center font-bold text-lg">${sale.quantity}</td>
                    <td class="text-right p-3">
                        <div class="text-blue-600 font-bold">￥${sale.total.toFixed(2)}</div>
                        <div class="text-xs ${profit>=0?'text-green-600':'text-red-600'}">利: ${profit.toFixed(2)}</div>
                    </td>
                    <td class="text-center"><button onclick="deleteSale(${sale.id})" class="text-red-400 p-2">删</button></td>
                </tr>`;
            });
            document.getElementById('salesTableBody').innerHTML = rows.join('');
            document.getElementById('todayTotalSum').innerText = todaySum.toFixed(0);
            document.getElementById('todayProfit').innerText = todayP.toFixed(0);
            document.getElementById('monthProfit').innerText = monthP.toFixed(0);
        }

        async function generateReport() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (!start || !end) return alert("请选择范围");
            const { data } = await supabaseClient.from('sales').select('*, products(name)').gte('created_at', `${start}T00:00:00`).lte('created_at', `${end}T23:59:59`);
            
            const dateSum = {}, prodSum = {};
            let totalRangeProfit = 0;
            data.forEach(s => {
                const p = s.total - s.cost;
                const d = new Date(s.created_at).toLocaleDateString('zh-CN').replace(/\//g, '-');
                dateSum[d] = (dateSum[d] || 0) + p;
                prodSum[s.products?.name] = (prodSum[s.products?.name] || 0) + p;
                totalRangeProfit += p;
            });

            document.getElementById('reportResult').classList.remove('hidden');
            document.getElementById('dateReportTotal').innerText = `总利: ￥${totalRangeProfit.toFixed(2)}`;
            document.getElementById('dateReportBody').innerHTML = Object.entries(dateSum).sort().reverse().map(([d, v]) => `<div class="flex justify-between border-b py-1"><span>${d}</span><span class="font-bold text-green-600">￥${v.toFixed(2)}</span></div>`).join('');
            document.getElementById('productReportBody').innerHTML = Object.entries(prodSum).sort((a,b)=>b[1]-a[1]).map(([n, v]) => `<div class="flex justify-between border-b py-1"><span>${n}</span><span class="font-bold">￥${v.toFixed(2)}</span></div>`).join('');
        }

        async function deleteSale(id) { if (confirm('确定删除？')) { await supabaseClient.from('sales').delete().eq('id', id); loadSales(); } }

        document.getElementById('salesForm').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.from('sales').insert([{
                product_id: formElements.product.value, quantity: parseInt(formElements.qty.value),
                cost: parseFloat(formElements.cost.value), total: parseFloat(formElements.total.value)
            }]);
            if (!error) { e.target.reset(); loadSales(); alert("保存成功"); }
        };

        checkUser();
    </script>
</body>
</html>
